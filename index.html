<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Mapa z nakładką Map Warper</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  >

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
    }

    .panel {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      background: white;
      padding: 10px 12px;
      border-radius: 6px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.35);
      font-family: Arial, sans-serif;
      font-size: 14px;
      line-height: 1.4;
    }

    .panel input {
      width: 180px;
    }

    .panel button {
      margin-top: 8px;
      width: 100%;
      padding: 6px 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="panel">
    <label for="opacity">Przezroczystość nakładki</label><br>
    <input id="opacity" type="range" min="0" max="100" value="60">
    <span id="opacityValue">60%</span>

    <br>
    <button id="zoomToOverlay">Pokaż nakładkę</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // ============================================================
    // 1. GRANICE NAKŁADKI
    // ============================================================
    // TU MUSISZ WPISAĆ PRAWDZIWE GRANICE TWOJEJ NAKŁADKI.
    //
    // Format:
    // [
    //   [southLat, westLon],
    //   [northLat, eastLon]
    // ]
    //
    // Czyli:
    // [
    //   [południe, zachód],
    //   [północ, wschód]
    // ]
    //
    // UWAGA: Leaflet używa kolejności [lat, lon], nie [lon, lat].

    const overlayBounds = [
      [50.0000, 19.0000], // <-- ZMIEŃ: południowo-zachodni narożnik
      [50.1000, 19.1000]  // <-- ZMIEŃ: północno-wschodni narożnik
    ];

    // ============================================================
    // 2. MAPA
    // ============================================================

    const map = L.map('map', {
      zoomControl: true
    });

    // Podkład satelitarny
    const satellite = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      {
        maxZoom: 19,
        attribution: 'Tiles &copy; Esri'
      }
    ).addTo(map);

    // Podkład OpenStreetMap
    const osm = L.tileLayer(
      'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
      }
    );

    // Twoja nakładka z Map Warpera
    const overlay = L.tileLayer(
      'https://mapwarper.net/maps/tile/107467/{z}/{x}/{y}.png',
      {
        maxZoom: 19,
        opacity: 0.6,
        attribution: 'Overlay: Map Warper'
      }
    ).addTo(map);

    // ============================================================
    // 3. STARTOWE ZBLIŻENIE DO NAKŁADKI
    // ============================================================

    map.fitBounds(overlayBounds, {
      padding: [30, 30]
    });

    // ============================================================
    // 4. KONTROLA WARSTW
    // ============================================================

    L.control.layers(
      {
        'Satelita': satellite,
        'OpenStreetMap': osm
      },
      {
        'Twoja nakładka': overlay
      },
      {
        collapsed: false
      }
    ).addTo(map);

    // ============================================================
    // 5. SUWAK PRZEZROCZYSTOŚCI
    // ============================================================

    document.getElementById('opacity').addEventListener('input', function () {
      const opacity = Number(this.value) / 100;
      overlay.setOpacity(opacity);
      document.getElementById('opacityValue').textContent = this.value + '%';
    });

    // ============================================================
    // 6. PRZYCISK: POKAŻ NAKŁADKĘ
    // ============================================================

    document.getElementById('zoomToOverlay').addEventListener('click', function () {
      map.fitBounds(overlayBounds, {
        padding: [30, 30]
      });
    });
  </script>
</body>
</html>
