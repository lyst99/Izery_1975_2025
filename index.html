<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Mapa z nakładką Map Warper</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  >

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
    }

    .panel {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      background: white;
      padding: 10px 12px;
      border-radius: 6px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.35);
      font-family: Arial, sans-serif;
      font-size: 14px;
    }

    .panel input {
      width: 180px;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="panel">
    <label for="opacity">Przezroczystość nakładki</label><br>
    <input id="opacity" type="range" min="0" max="100" value="60">
    <span id="opacityValue">60%</span>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    const map = L.map('map').setView([52.0, 19.0], 7);

    const osm = L.tileLayer(
      'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
      }
    );

    const satellite = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      {
        maxZoom: 19,
        attribution: 'Tiles &copy; Esri'
      }
    ).addTo(map);

    const overlay = L.tileLayer(
      'https://mapwarper.net/maps/tile/107467/{z}/{x}/{y}.png',
      {
        maxZoom: 19,
        opacity: 0.6,
        attribution: 'Overlay: Map Warper'
      }
    ).addTo(map);

    const baseMaps = {
      'Satelita': satellite,
      'OpenStreetMap': osm
    };

    const overlayMaps = {
      'Twoja nakładka': overlay
    };

    L.control.layers(baseMaps, overlayMaps, { collapsed: false }).addTo(map);

    document.getElementById('opacity').addEventListener('input', function () {
      const opacity = Number(this.value) / 100;
      overlay.setOpacity(opacity);
      document.getElementById('opacityValue').textContent = this.value + '%';
    });
  </script>
</body>
</html>
