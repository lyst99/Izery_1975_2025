<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Mapa z nakładką Map Warper</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  >

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
    }

    .panel {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      background: white;
      padding: 10px 12px;
      border-radius: 6px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.35);
      font-family: Arial, sans-serif;
      font-size: 14px;
      line-height: 1.4;
    }

    .panel input {
      width: 180px;
    }

    .panel button {
      margin-top: 8px;
      width: 100%;
      padding: 6px 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="panel">
    <label for="opacity">Przezroczystość nakładki</label><br>
    <input id="opacity" type="range" min="0" max="100" value="60">
    <span id="opacityValue">60%</span>

    <br>
    <button id="zoomToOverlay">Pokaż nakładkę</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // Punkt centralny Twojej nakładki — Góry Izerskie
    const overlayCenter = [50.876548, 15.316264];

    // Zoom startowy. Jeśli chcesz bliżej, zwiększ na 16 albo 17.
    const overlayZoom = 15;

    // Utworzenie mapy od razu w rejonie nakładki
    const map = L.map('map', {
      zoomControl: true
    }).setView(overlayCenter, overlayZoom);

    // Podkład satelitarny Esri
    const satellite = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      {
        maxZoom: 19,
        attribution: 'Tiles &copy; Esri'
      }
    ).addTo(map);

    // Podkład OpenStreetMap
    const osm = L.tileLayer(
      'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
      }
    );

    // Twoja nakładka z Map Warpera
    const overlay = L.tileLayer(
      'https://mapwarper.net/maps/tile/107467/{z}/{x}/{y}.png',
      {
        maxZoom: 19,
        opacity: 0.6,
        attribution: 'Overlay: Map Warper'
      }
    ).addTo(map);

    // Opcjonalny marker pomocniczy w środku obszaru
    const marker = L.marker(overlayCenter)
      .addTo(map)
      .bindPopup('Rejon nakładki')
      .openPopup();

    // Przełącznik warstw
    L.control.layers(
      {
        'Satelita': satellite,
        'OpenStreetMap': osm
      },
      {
        'Twoja nakładka': overlay,
        'Marker środka': marker
      },
      {
        collapsed: false
      }
    ).addTo(map);

    // Suwak przezroczystości
    document.getElementById('opacity').addEventListener('input', function () {
      const opacity = Number(this.value) / 100;
      overlay.setOpacity(opacity);
      document.getElementById('opacityValue').textContent = this.value + '%';
    });

    // Przycisk zbliżenia do nakładki
    document.getElementById('zoomToOverlay').addEventListener('click', function () {
      map.setView(overlayCenter, overlayZoom);
    });
  </script>
</body>
</html>
